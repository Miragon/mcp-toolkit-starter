name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck + Bundle
    runs-on: ubuntu-latest
    env:
      # The .npmrc resolves ${GITHUB_TOKEN} for the restricted @miragon scope.
      # The workflow token works when this repo has been granted read access to
      # the packages (org repos); otherwise add a PACKAGES_READ_TOKEN secret —
      # a PAT with read:packages.
      GITHUB_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # No --frozen-lockfile: a repo freshly created from the template has no
      # lockfile yet. Commit the lockfile after your first install.
      - run: pnpm install --no-frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm build:bundle
